<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPD 影像裁切工作台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root { 
            --primary-bg: #f1f5f9;
            --sidebar-bg: #ffffff;
            --accent-color: #2563eb; 
            --text-main: #0f172a;
            --text-sub: #64748b;
            --border-color: #e2e8f0;
        }

        body { 
            font-family: system-ui, -apple-system, sans-serif;
            display: flex; 
            height: 100vh; 
            margin: 0; 
            background: var(--primary-bg);
            color: var(--text-main);
            overflow: hidden;
        }
        
        .sidebar { 
            width: 280px; 
            background: var(--sidebar-bg); 
            padding: 24px; 
            border-right: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            z-index: 10;
            overflow-y: auto;
        }

        .sidebar h2 { font-size: 1.2rem; margin-bottom: 15px; font-weight: 800; color: var(--accent-color); letter-spacing: 1px; }
        .sidebar h3 { font-size: 0.75rem; color: var(--text-sub); text-transform: uppercase; margin-top: 10px; margin-bottom: 4px; }
        
        button { 
            padding: 12px; 
            cursor: pointer; 
            background: #fff; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            text-align: left; 
            transition: 0.2s;
            font-size: 0.9rem;
        }

        button:hover { border-color: var(--accent-color); background: #f8fafc; }
        button.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }

        .custom-ratio-group { display: flex; align-items: center; gap: 6px; }
        .custom-ratio-group input { 
            width: 50px; 
            padding: 8px; 
            border: 1px solid var(--border-color); 
            border-radius: 6px; 
            text-align: center;
        }
        .btn-apply { background: #334155; color: white; flex: 1; text-align: center; border: none; }

        .btn-upload { background: #eff6ff; border: 2px dashed var(--accent-color); color: var(--accent-color); text-align: center; font-weight: 600; }
        .btn-download { 
            margin-top: 20px; 
            background: #10b981; 
            color: white; 
            border: none; 
            font-weight: 700; 
            text-align: center; 
            padding: 15px;
        }
        .btn-download:hover { background: #059669; }

        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .img-container { 
            width: 100%; 
            height: 100%; 
            background: #e2e8f0;
            border-radius: 12px; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        /* 必須設定為 block 並將 max-width 設為 100% 供 Cropper 使用 */
        #target-image { display: block; max-width: 100%; max-height: 100%; }

        #upload-input { display: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>EPD STUDIO</h2>
    
    <h3>Step 1. 上傳檔案</h3>
    <button class="btn-upload" onclick="document.getElementById('upload-input').click()">選取照片上傳</button>
    <input type="file" id="upload-input" accept="image/*">

    <h3>Step 2. 裁切比例設定</h3>
    <button class="ratio-btn active" onclick="setRatio(35/45, this)">證件照 (35:45)</button>
    <button class="ratio-btn" onclick="setRatio(2/1, this)">橫向長方型 (2:1)</button>
    <button class="ratio-btn" onclick="setRatio(1/2, this)">直向長方型 (1:2)</button>
    <button class="ratio-btn" onclick="setRatio(4/3, this)">橫向拍立得 (4:3)</button>
    <button class="ratio-btn" onclick="setRatio(3/4, this)">直向拍立得 (3:4)</button>
    
    <h3>自定義比例</h3>
    <div class="custom-ratio-group">
        <input type="number" id="ratioX" value="16">
        <span>:</span>
        <input type="number" id="ratioY" value="9">
        <button class="btn-apply" onclick="applyCustomRatio()">套用</button>
    </div>

    <button class="btn-download" onclick="downloadResult()">確認裁切並下載</button>
</div>

<div class="main-content">
    <div class="img-container">
        <img id="target-image" src="">
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>
    let cropper;
    const image = document.getElementById('target-image');
    const input = document.getElementById('upload-input');
    let currentAspectRatio = 35/45; // 初始比例

    // 當圖片完全載入後，才初始化 Cropper
    image.onload = function() {
        if (cropper) {
            cropper.destroy(); // 銷毀舊的實例
        }
        cropper = new Cropper(image, {
            aspectRatio: currentAspectRatio,
            viewMode: 1,
            dragMode: 'move',
            autoCropArea: 0.8,
            responsive: true,
            restore: false,
        });
    };

    // 處理檔案上傳
    input.onchange = function (e) {
        const files = e.target.files;
        if (files && files.length > 0) {
            // 讀取檔案
            const reader = new FileReader();
            reader.onload = function(event) {
                // 將圖片路徑賦值給 <img> 標籤，這會觸發上面的 image.onload
                image.src = event.target.result;
            };
            reader.readAsDataURL(files[0]);
        }
    };

    // 切換預設比例
    function setRatio(ratio, btn) {
        currentAspectRatio = ratio;
        if (cropper) {
            cropper.setAspectRatio(ratio);
        }
        // 更新 UI
        document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
    }

    // 自定義比例套用
    function applyCustomRatio() {
        const x = parseFloat(document.getElementById('ratioX').value);
        const y = parseFloat(document.getElementById('ratioY').value);
        if (x > 0 && y > 0) {
            setRatio(x / y);
            document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
        }
    }

    // 下載裁切後的圖片
    function downloadResult() {
        if (!cropper) {
            alert("請先上傳圖片！");
            return;
        }
        
        // 輸出為 1200px 寬度，確保清晰
        const canvas = cropper.getCroppedCanvas({
            width: 1200,
            imageSmoothingQuality: 'high'
        });

        // 建立下載連結
        const link = document.createElement('a');
        link.download = `EPD_Crop_${Date.now()}.jpg`;
        link.href = canvas.toDataURL('image/jpeg', 0.9);
        link.click();
    }
</script>

</body>
</html>
