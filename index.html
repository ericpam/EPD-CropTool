<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPD 影像裁切工作台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; margin: 0; background: #eef2f3; }
        
        /* 左側功能區 */
        .sidebar { width: 280px; background: #fff; padding: 25px; border-right: 1px solid #ddd; display: flex; flex-direction: column; gap: 15px; box-shadow: 2px 0 5px rgba(0,0,0,0.05); overflow-y: auto; }
        .sidebar h2 { font-size: 20px; color: var(--primary-color); margin-bottom: 10px; border-bottom: 2px solid var(--accent-color); padding-bottom: 5px; }
        .sidebar h3 { font-size: 14px; color: #7f8c8d; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; }
        
        button { padding: 12px; cursor: pointer; background: #fff; border: 1px solid #dcdde1; border-radius: 6px; text-align: left; transition: all 0.2s; font-size: 14px; }
        button:hover { background: #f5f6fa; border-color: var(--accent-color); color: var(--accent-color); }
        button.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }

        /* 自定義比例輸入區 */
        .custom-ratio-group { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
        .custom-ratio-group input { width: 60px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; text-align: center; }
        .btn-apply { background: var(--primary-color); color: white; border: none; text-align: center; flex: 1; }

        .btn-download { margin-top: 20px; background: #27ae60; color: white; border: none; font-weight: bold; text-align: center; font-size: 16px; }
        .btn-download:hover { background: #219150; }

        /* 右側編輯區 */
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; position: relative; }
        .img-container { width: 100%; height: 100%; background-image: radial-gradient(#d1d1d1 1px, transparent 1px); background-size: 20px 20px; display: flex; align-items: center; justify-content: center; border-radius: 8px; overflow: hidden; }
        img { display: block; max-width: 100%; }

        #upload-input { display: none; }
        .tip { position: absolute; bottom: 20px; color: #95a5a6; font-size: 12px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>EPD Studio</h2>
    
    <h3>1. 檔案操作</h3>
    <button onclick="document.getElementById('upload-input').click()" style="text-align:center; background:#f8f9fa;">上傳原始圖片</button>
    <input type="file" id="upload-input" accept="image/*">

    <h3>2. 選擇裁切比例</h3>
    <button class="ratio-btn" onclick="setRatio(35/45, this)">1. 證件照 (35:45)</button>
    <button class="ratio-btn" onclick="setRatio(2/1, this)">2. 橫向長方型 (2:1)</button>
    <button class="ratio-btn" onclick="setRatio(1/2, this)">3. 直向長方型 (1:2)</button>
    <button class="ratio-btn" onclick="setRatio(4/3, this)">4. 橫向拍立得 (4:3)</button>
    <button class="ratio-btn" onclick="setRatio(3/4, this)">5. 直向拍立得 (3:4)</button>
    <button class="ratio-btn" onclick="setRatio(1/1, this)">6. 正方型 (1:1)</button>
    
    <h3>7. 自定義比例 (X:Y)</h3>
    <div class="custom-ratio-group">
        <input type="number" id="ratioX" placeholder="寬" value="16">
        <span>:</span>
        <input type="number" id="ratioY" placeholder="高" value="9">
        <button class="btn-apply" onclick="applyCustomRatio()">套用</button>
    </div>
    <button class="ratio-btn" onclick="setRatio(NaN, this)" style="margin-top:5px;">自由拉伸 (無限制)</button>

    <button class="btn-download" onclick="downloadResult()">裁切並存檔照片</button>
</div>

<div class="main-content">
    <div class="img-container">
        <img id="target-image" src="https://via.placeholder.com/800x600?text=Wait+for+Upload">
    </div>
    <div class="tip">提示：使用滑鼠滾輪可縮放圖片，拖曳圖片可移動位置</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>
    let cropper;
    const image = document.getElementById('target-image');
    const input = document.getElementById('upload-input');

    // 初始化 Cropper 的設定
    const config = {
        aspectRatio: 35/45, // 初始預設為證件照
        viewMode: 1, 
        dragMode: 'move', 
        autoCropArea: 0.8,
        background: false, // 關閉格紋背景讓視覺乾淨點
    };

    function initCropper() {
        if (cropper) cropper.destroy();
        cropper = new Cropper(image, config);
    }

    // 檔案選取處理
    input.onchange = function (e) {
        const files = e.target.files;
        if (files && files.length > 0) {
            const url = URL.createObjectURL(files[0]);
            image.src = url;
            initCropper();
        }
    };

    // 切換預設比例
    function setRatio(ratio, btn) {
        if (!cropper) return;
        cropper.setAspectRatio(ratio);
        
        // 處理按鈕樣式切換
        document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
    }

    // 套用自定義比例
    function applyCustomRatio() {
        const x = parseFloat(document.getElementById('ratioX').value);
        const y = parseFloat(document.getElementById('ratioY').value);
        if (x > 0 && y > 0) {
            setRatio(x / y);
            // 移除其他按鈕的選取狀態
            document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
        } else {
            alert("請輸入正確的數字比例");
        }
    }

    // 裁切並下載
    function downloadResult() {
        if (!cropper) {
            alert("請先上傳圖片");
            return;
        }
        
        // 取得裁切後的 Canvas
        // width: 1200 確保輸出的解析度夠高，適合列印
        const canvas = cropper.getCroppedCanvas({
            width: 1200, 
            imageSmoothingQuality: 'high'
        });

        // 轉換為圖片並下載
        const link = document.createElement('a');
        link.download = 'EPD_Custom_Product.jpg';
        link.href = canvas.toDataURL('image/jpeg', 0.9); 
        link.click();
    }

    // 頁面載入完成後初始化
    window.onload = initCropper;
</script>

</body>
</html>
